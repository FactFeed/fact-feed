# Test Profile - Use H2 in-memory database for testing
spring.application.name=factfeed-test

# H2 In-Memory Database for testing  
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Settings for testing
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

# Disable database script execution for tests
spring.sql.init.continue-on-error=true

# Enable scraping for tests
factfeed.scraping.enabled=true
factfeed.scraping.user-agent=FactFeed-Test-Bot/1.0
factfeed.scraping.delay-between-requests=100
factfeed.scraping.timeout=5000

# Logging for tests
logging.level.com.factfeed=DEBUG
logging.level.org.springframework.jdbc=DEBUG