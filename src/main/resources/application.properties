# FactFeed Application Configuration

# Application Info
spring.application.name=factfeed

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/factfeed
spring.datasource.username=factfeed
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Server Configuration
server.port=8080

# AI Configuration (Add your Gemini API key)
spring.ai.openai.api-key=${GEMINI_API_KEY:your-api-key-here}
spring.ai.openai.chat.model=gemini-1.5-flash

# FactFeed Pipeline Configuration
factfeed.pipeline.enabled=true
factfeed.pipeline.summarization.limit=50
factfeed.pipeline.clustering.similarity-threshold=0.8
factfeed.pipeline.clustering.max-age-days=2

# Scraping Configuration
factfeed.scraping.enabled=true
factfeed.scraping.user-agent=FactFeed-Bot/1.0 (+https://factfeed.com/about)
factfeed.scraping.delay-between-requests=2000
factfeed.scraping.timeout=10000

# Logging Configuration
logging.level.com.factfeed=DEBUG
logging.level.org.springframework.ai=DEBUG
