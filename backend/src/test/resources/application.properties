# Test-specific overrides
scheduler.enabled=false
# Use in-memory H2 for tests (overrides main Postgres config)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
# Spring AI: provide dummy Google GenAI config to satisfy auto-config in tests
spring.ai.model.chat=google-genai
spring.ai.google.genai.project-id=test-project
spring.ai.google.genai.api-key=test-key
spring.ai.google.genai.model=gemini-2.5-flash
