spring.application.name=backend
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/factfeed
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.id.optimizer.pooled.prefer_lo=true
# Scheduling Configuration
scheduler.enabled=true
scheduler.scraping.limit=20
scheduler.summarization.limit=20
scheduler.clustering.hours=6
scheduler.clustering.similarity=0.7
scheduler.aggregation.max-age-hours=12
# Scraping Configuration
scraping.default-delay=1.0
scraping.default-max-retries=3
scraping.default-timeout=30
# AI API Configuration - Multiple Accounts for Load Balancing
secret.gemini_key_z1=${GEMINI_KEY_Z1}
secret.gemini_key_z2=${GEMINI_KEY_Z2:}
secret.gemini_key_z3=${GEMINI_KEY_Z3:}
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_KEY_Z1}
spring.ai.google.genai.model=gemini-2.5-flash
# Threading Configuration
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=factfeed-task-
# API Rate Limiting
api.rate-limit.requests-per-minutes=10
api.rate-limit.tokens-per-minutes=250000
api.rate-limit.requests-per-day=250