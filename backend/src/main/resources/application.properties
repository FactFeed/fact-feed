spring.application.name=backend
# Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/factfeed
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.id.optimizer.pooled.prefer_lo=true
# Scraper Configuration
scraper.webdriver.type=chrome
scraper.webdriver.headless=true
scraper.webdriver.timeout=30
scraper.webdriver.window.width=1920
scraper.webdriver.window.height=1080
# Scraping Behavior
scraper.batch.size=20
scraper.concurrent.threads=3
scraper.discovery.max-urls=100
# Storage Configuration
scraper.storage.directory=./data/articles
scraper.storage.backup.enabled=true
scraper.storage.max-articles-per-site=10000
# Logging
logging.level.com.factfeed.backend.scraper=INFO
logging.level.org.selenium=WARN
logging.level.org.jsoup=WARN